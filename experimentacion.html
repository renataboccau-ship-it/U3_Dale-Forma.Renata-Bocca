<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dale Forma</title>
  <link rel="stylesheet" href="experimentacion.css">
</head>
<body>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- SPLASH -->
<div id="splash">
  <canvas id="splash-canvas"></canvas>
  <div id="splash-content">
    <p id="tag">Interfaz expresiva</p>
    <div id="line1">
      <span style="color:#73BC76">D</span><span style="color:#D12839">A</span><span style="color:#87CEE9">L</span><span style="color:#F5A02D">E</span>
    </div>
    <div id="line2">
      <span style="color:#87CEE9">F</span><span style="color:#F5A02D">O</span><span style="color:#87CEE9">R</span><span style="color:#73BC76">M</span><span style="color:#D12839">A</span>
    </div>
    <p id="sub">Descubre formas y colores</p>
    <button id="splashBtn">Probar experiencia</button>
  </div>
</div>
  <!-- EXPERIENCIA -->
  <div id="wrap">
    <canvas id="back"></canvas>
    <canvas id="particles"></canvas>
    <div id="mosaic"></div>
    <div id="progress-dots"></div>
    <div id="round-badge"></div>
    <div id="hint"><p>Arrastra las piezas</p></div>
    <p id="freeplay-hint">Mueve el mouse cerca de FORMA · haz click para dispersar</p>
    <div id="btn-wrap">
      <button id="secondaryBtn">continuar</button>
      <button id="mainBtn">generar composición</button>
    </div>
    <div id="label">forma</div>
  </div>

  <!-- DESPEDIDA -->
  <div id="farewell">
    <p id="farewell-tag">Gracias por explorar</p>
    <p id="farewell-msg">Le diste FORMA a tu propia composición</p>
    <div id="farewell-actions">
      <button id="retryBtn">Volver a probar</button>
      <button id="farewellBtn">Volver al inicio</button>
    </div>
  </div>

  <script src="experimentacion.js"></script>
</body>
</html>
