<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forma</title>
  <link rel="stylesheet" href="experimentacion.css">
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <div id="splash-inner">
      <h1 id="splash-title">Dale<br>Forma</h1>
      <p id="splash-sub">Descubre figuras y colores</p>
      <button id="splashBtn">probar experiencia</button>
    </div>
  </div>

  <!-- EXPERIENCIA -->
  <div id="wrap">
    <canvas id="back"></canvas>
    <canvas id="paint"></canvas>
    <canvas id="particles"></canvas>
    <div id="mosaic"></div>
    <div id="hint"><p>arrastra las piezas</p></div>
    <div id="combo-label"></div>
    <div id="btn-wrap">
      <button id="mainBtn">generar composición</button>
      <button id="saveBtn" title="guardar imagen">guardar</button>
      <button id="clearBtn" title="limpiar lienzo">limpiar</button>
      <button id="soundBtn" title="sonido">🔊</button>
    </div>
    <div id="label">forma</div>
  </div>

  <script src="experimentacion.js"></script>
</body>
</html>
