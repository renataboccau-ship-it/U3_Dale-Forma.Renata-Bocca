<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Ejemplo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-content">
            <h1>repositorio renata</h1>
            <p>
                Esto es una página web de ejemplo utilizando HTML, CSS y JavaScript.
            </p>
            <a href="#galeria" class="btn">Ver Galería</a>
        </div>
    </section>

    <!-- PARALLAX -->
    <section class="parallax">
        <div class="overlay">
            <h2>Esto es un título 2</h2>
        </div>
    </section>


    <!-- GALERÍA -->
    <section id="galeria" class="galeria">
        <h2>Galería</h2>

        <div class="grid">
            <img src="assets/catapultazo.jpg" alt="">
            <img src="assets/conectando.jpg" alt="">
            <img src="assets/cuadriculando.png" alt="">
            <img src="assets/daleforma.png" alt="">
            <img src="assets/enlace.png" alt="">
            <img src="assets/enrutate.png" alt="">
            <img src="assets/polkup.png" alt="">
            <img src="assets/zona.png" alt=""
        </div>
    </section>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
        <span class="cerrar">&times;</span>
        <img id="imagen-ampliada" src="" alt="">
    </div>

    <script src="script.js"></script>

</body>
</html>
