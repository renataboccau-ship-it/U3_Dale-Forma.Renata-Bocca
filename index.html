<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dale Forma</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="hero">

        <!-- PIEZAS FLOTANTES -->

        <!-- TRIÁNGULOS -->
        <div class="floating-piece triangle t1"></div>
        <div class="floating-piece triangle t2"></div>
        <div class="floating-piece triangle t3"></div>
        <div class="floating-piece triangle t4"></div>

        <!-- CÍRCULOS -->
        <div class="floating-piece circle c1"></div>
        <div class="floating-piece circle c2"></div>

        <!-- CUADRADOS -->
        <div class="floating-piece rect r1"></div>
        <div class="floating-piece rect r2"></div>

        <!-- ARCOS -->
        <div class="floating-piece arc a1"></div>
        <div class="floating-piece arc a2"></div>
        <div class="floating-piece arc a3"></div>
        <div class="floating-piece arc a4"></div>

        <!-- BARRAS -->
        <div class="bar1"></div>
        <div class="bar2"></div>

        <!-- CONTENIDO CENTRAL -->

        <div class="hero-content">

            <h1>

                <span class="green">D</span>
                <span class="red">A</span>
                <span class="blue">l</span>
                <span class="orange">e</span>

                <br>

                <span class="blue">F</span>
                <span class="orange">o</span>
                <span class="green">r</span>
                <span class="blue">m</span>
                <span class="red">A</span>

            </h1>

            <p>¡Construye, junta y gana!</p>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
