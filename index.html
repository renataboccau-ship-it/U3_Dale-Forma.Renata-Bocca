<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hero -->
    <section class="hero">

        <!-- Formas flotantes -->
        <div class="floating layer1 triangle"></div>
        <div class="floating layer2 circle"></div>
        <div class="floating layer3 arc"></div>
        <div class="floating layer4 rect"></div>

        <div class="floating layer5 triangle"></div>
        <div class="floating layer6 circle"></div>
        <div class="floating layer7 arc"></div>
        <div class="floating layer8 rect"></div>

        <!-- Contenido principal -->
        <div class="hero-content">

            <img
                src="assets/Recurso 1.svg"
                alt="Logo del juego"
                class="logo"
            >

            <p>¡Construye, junta y gana!</p>

            <a href="#juego" class="btn">
                Explorar
            </a>

        </div>

    </section>

    <!-- Descripción -->
    <section class="info" id="juego">

        <p>
            Utiliza piezas, conectores y creatividad para representar
            conceptos, sorprender a los demás jugadores y reunir las
            cartas necesarias para alcanzar la victoria.
        </p>

    </section>

    <!-- Cartas -->
    <section class="cards">

        <div class="card">
            <img src="cartas1.png" alt="Carta 1">
        </div>

        <div class="card">
            <img src="cartas2.png" alt="Carta 2">
        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
