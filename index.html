<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dale Forma</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="noise"></div>

<section class="hero">

    <div class="floating layer1 triangle"></div>
    <div class="floating layer2 circle"></div>
    <div class="floating layer3 arc"></div>
    <div class="floating layer4 rect"></div>

    <div class="floating layer5 triangle"></div>
    <div class="floating layer6 circle"></div>
    <div class="floating layer7 arc"></div>
    <div class="floating layer8 rect"></div>

    <div class="hero-content">

        <h1>
            <span class="green">D</span>
            <span class="red">A</span>
            <span class="blue">L</span>
            <span class="orange">e</span>
            <br>
            <span class="blue">F</span>
            <span class="green">o</span>
            <span class="orange">r</span>
            <span class="red">m</span>
            <span class="blue">a</span>
        </h1>

        <p>¡Construye, junta y gana!</p>

        <a href="#juego" class="btn">
            Explorar
        </a>

    </div>

</section>


<section id="juego" class="video-section">

   <video autoplay muted loop playsinline class="video-bg">
    <source src="assets/puedes_animar_esta_imagen_que.mp4" type="video/mp4">
</video>
    </div>

</section>


<section class="info">

    <p>
        Utiliza piezas, conectores y creatividad para representar conceptos,
        sorprender a los demás jugadores y reunir las cartas necesarias
        para alcanzar la victoria.
    </p>

</section>


<section class="cards">

    <div class="card">
        <img src="cartas1.png">
    </div>

    <div class="card">
        <img src="cartas2.png">
    </div>

</section>

<script src="script.js"></script>

</body>
</html>
